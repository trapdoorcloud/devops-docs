[project]
site_name = "DevOps Documentation"
site_url = "https://docs.trapdoor.cloud/"
site_author = "Ashley Kleynhans & DevOps Team"
repo_url = "https://github.com/trapdoorcloud/devops-docs"
edit_uri = "edit/main/docs/"
site_description = "DevOps Engineers Documentation"
copyright = "Copyright &copy; 2026 Trapdoor.cloud DevOps team"
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["https://unpkg.com/mermaid@8.5.2/dist/mermaid.min.js"]
nav = [
  {"Home" = "index.md"},
  {"About DevOps Docs" = [
    "docs/contributing.md",
    "docs/basic-editing.md",
    "docs/advanced-editing.md",
    "docs/quickstart-venv.md",
    "docs/why.md",
    "docs/compare.md",
    "docs/CHANGELOG.md",
  ]},
  {"Procedures" = [
    {"Git" = [
      "procedure/git-branching.md",
      "procedure/git-signing.md",
    ]},
    {"Onboarding DevOps member" = "procedure/onboarding.md"},
  ]},
  {"Applications" = [
    {"Ansible" = [
      {"Overview" = "app/ansible/overview.md"},
      {"Quickstart" = "app/ansible/quickstart.md"},
      {"Contributing" = "app/ansible/contributing.md"},
      {"Inventory" = "app/ansible/inventory.md"},
      {"Group Vars" = "app/ansible/group-vars.md"},
      {"Local Dev Setup" = "app/ansible/local-development-setup.md"},
      {"Troubleshooting" = "app/ansible/troubleshooting.md"},
      {"Tips" = "app/ansible/tips.md"},
      {"Project Structure" = "app/ansible/project-structure.md"},
    ]},
  ]},
  {"Team" = [
    "team/about.md",
    "team/devops.md",
  ]},
]

[project.theme]
name = "material"
custom_dir = "overrides"
font.text = "Roboto"
font.code = "Roboto Mono"
static_templates = ["404.html"]

[project.theme.icon]
logo = "fontawesome/solid/book-open-reader"
repo = "fontawesome/brands/git-alt"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/lightbulb-outline"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/lightbulb"
toggle.name = "Switch to light mode"

[project.plugins.search]

[project.plugins.with-pdf]
output_path = "pdf/devops-documentation.pdf"
cover_logo = "img/sre-dude.jpg"
cover_subtitle = "DevOps Engineering Book"
enabled_if_env = "ENABLE_PDF_EXPORT"

[project.plugins.redirects]
redirect_maps = {
  "app/ansible.md" = "infra/ansible/overview.md"
}

[project.markdown_extensions.extra]

[project.markdown_extensions.toc]
permalink = "#"

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.codehilite]
guess_lang = false
linenums = false

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_div_format" },
]

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "pymdownx.emoji.twemoji"
emoji_generator = "pymdownx.emoji.to_svg"

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
clickable_checkbox = true

[project.markdown_extensions."markdown_include.include"]

[[project.extra.social]]
icon = "fontawesome/solid/book-open-reader"
link = "https://docs.trapdoor.cloud/"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/trapdoorcloud/devops-docs"

[[project.extra.social]]
icon = "fontawesome/solid/envelope"
link = "mailto:ashley@example.com"
